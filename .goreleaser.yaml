# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: eitango

builds:
  - id: eitango
    main: ./cmd/eitango
    binary: eitango
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: unix-archives
    ids:
      - eitango
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - README.en.md
      - THIRD_PARTY_NOTICES.md
      - third_party/licenses/**
    format_overrides:
      - goos: windows
        formats: [none]
  - id: windows-archive
    ids:
      - eitango
    formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - README.en.md
      - THIRD_PARTY_NOTICES.md
      - third_party/licenses/**
    format_overrides:
      - goos: darwin
        formats: [none]
      - goos: linux
        formats: [none]

brews:
  - name: eitango
    ids:
      - unix-archives
    directory: Formula
    homepage: https://github.com/harumiWeb/eitango
    description: Interactive English vocabulary learning CLI built with Go.
    license: Apache-2.0
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: harumiWeb
      name: homebrew-eitango
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    install: |
      bin.install "eitango"
      doc.install "README.md", "README.en.md"
      pkgshare.install "LICENSE", "THIRD_PARTY_NOTICES.md"
      (pkgshare/"third_party").install "third_party/licenses"
    test: |
      system "#{bin}/eitango", "--help"
    skip_upload: "{{ if .Prerelease }}true{{ else }}false{{ end }}"

winget:
  - name: eitango
    publisher: HarumiWeb
    package_identifier: HarumiWeb.Eitango
    package_name: eitango
    short_description: Terminal-based English vocabulary learning CLI.
    description: Interactive English vocabulary learning CLI built with Go.
    license: Apache-2.0
    homepage: https://github.com/harumiWeb/eitango
    publisher_url: https://github.com/harumiWeb
    publisher_support_url: https://github.com/harumiWeb/eitango/issues
    license_url: https://github.com/harumiWeb/eitango/blob/{{ .Tag }}/LICENSE
    tags:
      - go
      - cli
      - english
      - learning
      - vocabulary
    ids:
      - windows-archive
    repository:
      owner: harumiWeb
      name: winget-pkgs
      branch: eitango-{{ .Version }}
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_msg_template: "{{ .PackageIdentifier }}: {{ .Tag }}"
    skip_upload: "{{ if .Prerelease }}true{{ else }}false{{ end }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
